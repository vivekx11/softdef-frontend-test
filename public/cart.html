<!DOCTYPE html><html class="scroll-smooth" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Cart | Verdant Botanical</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"error":"#ba1a1a","background":"#f9f9f9","on-error":"#ffffff","on-primary-container":"#80988b","outline-variant":"#c2c8c3","on-surface":"#1a1c1c","secondary-container":"#dde5db","surface-container-lowest":"#ffffff","surface":"#f9f9f9","on-primary":"#ffffff","surface-container-low":"#f3f3f4","outline":"#727974","surface-container":"#eeeeee","primary-container":"#1a3026","surface-container-highest":"#e2e2e2","on-surface-variant":"#424844","surface-container-high":"#e8e8e8","secondary":"#586059","primary":"#051b12","tertiary":"#00182f","on-tertiary":"#ffffff","on-secondary":"#ffffff","on-secondary-fixed-variant":"#414942"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},fontFamily:{"headline-sm":["Noto Serif"],"body-lg":["Inter"],"body-md":["Inter"],"display-lg":["Noto Serif"],"label-md":["Inter"],"headline-md":["Noto Serif"],caption:["Inter"]},fontSize:{"headline-sm":["24px",{lineHeight:"1.4",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],"body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],"label-md":["14px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],"headline-md":["32px",{lineHeight:"1.3",fontWeight:"600"}]}}}}</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.ambient-shadow{box-shadow:0 10px 40px -15px rgba(26,48,38,0.08)}.nav-blur{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}</style>
</head><body class="bg-background text-on-surface font-body-md">
<div id="navbar"></div>
<main class="pt-28 pb-24"><div class="max-w-[1280px] mx-auto px-6 md:px-12">
<h1 class="font-headline-md text-headline-md text-primary mb-8">Your Cart</h1>
<div id="cart-content"></div>
</div></main>
<div id="footer"></div>
<script src="/js/app.js"></script><script src="/js/templates.js"></script>
<script>
function renderCart(){
  const cart=getCart();const el=document.getElementById('cart-content');
  if(!cart.length){el.innerHTML=`<div class="text-center py-24"><span class="material-symbols-outlined text-6xl text-outline-variant mb-4 block">shopping_cart</span><p class="text-on-surface-variant font-body-lg mb-6">Your cart is empty</p><a href="/shop.html" class="bg-primary text-on-primary px-8 py-4 rounded-lg font-bold hover:opacity-90 transition-opacity inline-block">Start Shopping</a></div>`;return;}
  const items=cart.map(ci=>{const p=PRODUCTS.find(x=>x.id===ci.id);if(!p)return'';return`
    <div class="flex items-center gap-6 bg-surface-container-lowest p-6 rounded-2xl ambient-shadow">
      <a href="/product.html?id=${p.id}" class="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0"><img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover"></a>
      <div class="flex-1 min-w-0"><a href="/product.html?id=${p.id}" class="font-bold text-primary text-lg hover:underline">${p.name}</a><p class="text-on-surface-variant text-sm">${p.subtitle}</p></div>
      <div class="flex items-center gap-1 bg-surface-container-low rounded-lg">
        <button onclick="updateQty(${p.id},${ci.qty-1});if(${ci.qty}<=1)removeFromCart(${p.id});renderCart()" class="p-2 hover:bg-surface-container rounded-l-lg"><span class="material-symbols-outlined text-sm">remove</span></button>
        <span class="w-8 text-center font-bold">${ci.qty}</span>
        <button onclick="updateQty(${p.id},${ci.qty+1});renderCart()" class="p-2 hover:bg-surface-container rounded-r-lg"><span class="material-symbols-outlined text-sm">add</span></button>
      </div>
      <span class="font-bold text-primary w-20 text-right">$${(p.price*ci.qty).toFixed(2)}</span>
      <button onclick="removeFromCart(${p.id});renderCart()" class="p-2 hover:bg-error/10 rounded-lg text-error"><span class="material-symbols-outlined">delete</span></button>
    </div>`;}).join('');
  const total=getCartTotal();
  el.innerHTML=`<div class="space-y-4">${items}</div>
    <div class="mt-8 bg-surface-container-lowest p-8 rounded-2xl ambient-shadow max-w-md ml-auto space-y-4">
      <div class="flex justify-between text-on-surface-variant"><span>Subtotal</span><span>$${total.toFixed(2)}</span></div>
      <div class="flex justify-between text-on-surface-variant"><span>Shipping</span><span class="text-primary font-semibold">Free</span></div>
      <div class="border-t border-outline-variant/30 pt-4 flex justify-between"><span class="font-bold text-primary text-lg">Total</span><span class="font-bold text-primary text-lg">$${total.toFixed(2)}</span></div>
      <button onclick="getCart().length&&(localStorage.removeItem('verdant_cart'),showToast('Order placed! 🌱 Thank you!'),setTimeout(()=>location.href='/',1500))" class="w-full bg-primary text-on-primary py-4 rounded-lg font-bold hover:opacity-90 transition-opacity active:scale-95 mt-4">Checkout — $${total.toFixed(2)}</button>
    </div>`;
}
document.addEventListener('DOMContentLoaded',()=>{initPage('');renderCart()});
</script></body></html>
