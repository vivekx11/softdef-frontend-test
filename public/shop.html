<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.ambient-shadow{box-shadow:0 10px 40px -15px rgba(26,48,38,0.08)}.nav-blur{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}</style>
</head><body class="bg-background text-on-surface font-body-md">
<div id="navbar"></div>
<main class="pt-28 pb-24">
  <div class="max-w-[1280px] mx-auto px-6 md:px-12">
    <div class="text-center mb-12">
      <h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-4">Shop All Plants</h1>
      <p class="font-body-lg text-on-surface-variant max-w-xl mx-auto">Explore our full collection of hand-reared botanical companions.</p>
    </div>
    <!-- Filters -->
    <div class="flex flex-wrap gap-3 justify-center mb-12">
      <button onclick="filterProducts('all')" class="filter-btn active bg-primary text-on-primary px-5 py-2 rounded-full font-label-md text-label-md transition-all" data-filter="all">All</button>
      <button onclick="filterProducts('tropical')" class="filter-btn bg-secondary-container text-on-secondary-container px-5 py-2 rounded-full font-label-md text-label-md hover:bg-primary hover:text-on-primary transition-all" data-filter="tropical">Tropical</button>
      <button onclick="filterProducts('air-purifying')" class="filter-btn bg-secondary-container text-on-secondary-container px-5 py-2 rounded-full font-label-md text-label-md hover:bg-primary hover:text-on-primary transition-all" data-filter="air-purifying">Air Purifying</button>
      <button onclick="filterProducts('succulent')" class="filter-btn bg-secondary-container text-on-secondary-container px-5 py-2 rounded-full font-label-md text-label-md hover:bg-primary hover:text-on-primary transition-all" data-filter="succulent">Succulents</button>
      <button onclick="filterProducts('trailing')" class="filter-btn bg-secondary-container text-on-secondary-container px-5 py-2 rounded-full font-label-md text-label-md hover:bg-primary hover:text-on-primary transition-all" data-filter="trailing">Trailing</button>
      <button onclick="filterProducts('outdoor')" class="filter-btn bg-secondary-container text-on-secondary-container px-5 py-2 rounded-full font-label-md text-label-md hover:bg-primary hover:text-on-primary transition-all" data-filter="outdoor">Outdoor</button>
    </div>
    <!-- Product Grid -->
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-[24px]"></div>
  </div>
</main>
<div id="footer"></div>
<script src="/js/app.js"></script><script src="/js/templates.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPage('Shop All');
  renderProducts('all');
});
function renderProducts(filter) {
  const products = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
  document.getElementById('product-grid').innerHTML = products.map(p => `
    <a href="/product.html?id=${p.id}" class="group cursor-pointer block">
      <div class="relative aspect-square rounded-xl overflow-hidden bg-surface-container-low mb-6 ambient-shadow">
        <img alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="${p.img}">
        <button onclick="event.preventDefault();event.stopPropagation();addToCart(${p.id})" class="absolute bottom-4 right-4 bg-white/90 backdrop-blur p-3 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity translate-y-2 group-hover:translate-y-0 duration-300">
          <span class="material-symbols-outlined text-primary">add_shopping_cart</span>
        </button>
        ${p.badge ? `<div class="absolute top-4 left-4"><span class="${p.badgeType === 'new' ? 'bg-secondary-container text-on-secondary-fixed-variant' : 'bg-tertiary text-on-tertiary'} text-[12px] font-['Inter'] font-semibold px-3 py-1 rounded-full">${p.badge}</span></div>` : ''}
      </div>
      <h3 class="font-headline-sm text-headline-sm text-primary">${p.name}</h3>
      <div class="flex justify-between items-center mt-1">
        <span class="text-on-surface-variant font-body-md">${p.subtitle}</span>
        <span class="font-bold text-primary font-body-md">$${p.price.toFixed(2)}</span>
      </div>
    </a>`).join('');
}
function filterProducts(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('bg-primary', b.dataset.filter === cat);
    b.classList.toggle('text-on-primary', b.dataset.filter === cat);
    b.classList.toggle('bg-secondary-container', b.dataset.filter !== cat);
    b.classList.toggle('text-on-secondary-container', b.dataset.filter !== cat);
  });
  renderProducts(cat);
}
</script>
</body></html>
