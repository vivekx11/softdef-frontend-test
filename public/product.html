<!DOCTYPE html><html class="scroll-smooth" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Product | Verdant Botanical</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"error":"#ba1a1a","background":"#f9f9f9","on-error":"#ffffff","on-primary-container":"#80988b","outline-variant":"#c2c8c3","on-surface":"#1a1c1c","on-secondary":"#ffffff","secondary-container":"#dde5db","surface-variant":"#e2e2e2","surface-container-lowest":"#ffffff","surface":"#f9f9f9","on-primary":"#ffffff","surface-container-low":"#f3f3f4","outline":"#727974","on-tertiary":"#ffffff","surface-container":"#eeeeee","surface-dim":"#dadada","primary-container":"#1a3026","surface-container-highest":"#e2e2e2","on-surface-variant":"#424844","surface-container-high":"#e8e8e8","secondary":"#586059","primary":"#051b12","secondary-fixed":"#dde5db","tertiary":"#00182f","on-secondary-fixed-variant":"#414942"},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},fontFamily:{"headline-sm":["Noto Serif"],"body-lg":["Inter"],"body-md":["Inter"],"display-lg":["Noto Serif"],"label-md":["Inter"],"headline-md":["Noto Serif"],caption:["Inter"]},fontSize:{"headline-sm":["24px",{lineHeight:"1.4",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],"body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],"display-lg":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"700"}],"label-md":["14px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],"headline-md":["32px",{lineHeight:"1.3",fontWeight:"600"}]}}}}</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.ambient-shadow{box-shadow:0 10px 40px -15px rgba(26,48,38,0.08)}.nav-blur{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}</style>
</head><body class="bg-background text-on-surface font-body-md">
<div id="navbar"></div>
<main class="pt-28 pb-24"><div class="max-w-[1280px] mx-auto px-6 md:px-12">
<div class="mb-8"><a href="/shop.html" class="text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1"><span class="material-symbols-outlined text-sm">arrow_back</span> Back to Shop</a></div>
<div id="product-detail" class="grid grid-cols-1 md:grid-cols-2 gap-16 items-start"></div>
<div class="mt-24"><h2 class="font-headline-md text-headline-md text-primary mb-8">You May Also Like </h2><div id="related" class="grid grid-cols-2 lg:grid-cols-4 gap-6"></div></div>
</div></main>
<div id="footer"></div>
<script src="/js/app.js"></script><script src="/js/templates.js"></script>
<script>
let _qty=1;
function cq(){return _qty}
function chq(d){_qty=Math.max(1,_qty+d);document.getElementById('qd').textContent=_qty}
document.addEventListener('DOMContentLoaded',()=>{
  initPage('Shop All');
  const id=parseInt(new URLSearchParams(location.search).get('id'))||1;
  const p=PRODUCTS.find(x=>x.id===id)||PRODUCTS[0];
  document.title=p.name+' | Verdant Botanical';
  document.getElementById('product-detail').innerHTML=`
    <div class="aspect-square rounded-2xl overflow-hidden ambient-shadow bg-surface-container-low"><img alt="${p.name}" class="w-full h-full object-cover" src="${p.img}"></div>
    <div class="space-y-6 py-4">
      ${p.badge?`<span class="bg-secondary-container text-on-secondary-fixed-variant text-xs font-semibold px-3 py-1 rounded-full">${p.badge}</span>`:''}
      <h1 class="font-headline-md text-[40px] font-bold text-primary leading-tight">${p.name}</h1>
      <p class="text-on-surface-variant font-body-lg">${p.desc}</p>
      <div class="flex items-center gap-4"><span class="font-headline-md text-headline-md text-primary">$${p.price.toFixed(2)}</span><span class="text-on-surface-variant text-sm line-through">$${(p.price*1.3).toFixed(2)}</span></div>
      <div class="flex flex-wrap items-center gap-4">
        <div class="flex items-center bg-surface-container-low rounded-lg">
          <button onclick="chq(-1)" class="p-3 hover:bg-surface-container rounded-l-lg"><span class="material-symbols-outlined">remove</span></button>
          <span id="qd" class="w-10 text-center font-bold text-lg">1</span>
          <button onclick="chq(1)" class="p-3 hover:bg-surface-container rounded-r-lg"><span class="material-symbols-outlined">add</span></button>
        </div>
        <button onclick="addToCart(${p.id},cq())" class="bg-primary text-on-primary px-10 py-4 rounded-lg font-bold hover:opacity-90 transition-opacity active:scale-95 flex items-center gap-2"><span class="material-symbols-outlined">shopping_cart</span>Add to Cart</button>
      </div>
      <div class="grid grid-cols-3 gap-4 pt-4">
        <div class="text-center p-4 bg-surface-container-low rounded-xl"><span class="material-symbols-outlined text-primary mb-1 block">local_shipping</span><span class="text-xs text-on-surface-variant">Free Shipping</span></div>
        <div class="text-center p-4 bg-surface-container-low rounded-xl"><span class="material-symbols-outlined text-primary mb-1 block">eco</span><span class="text-xs text-on-surface-variant">Eco Packaging</span></div>
        <div class="text-center p-4 bg-surface-container-low rounded-xl"><span class="material-symbols-outlined text-primary mb-1 block">verified</span><span class="text-xs text-on-surface-variant">30-Day Guarantee</span></div>
      </div>
    </div>`;
  const rel=PRODUCTS.filter(x=>x.id!==p.id).slice(0,4);
  document.getElementById('related').innerHTML=rel.map(r=>`<a href="/product.html?id=${r.id}" class="group block"><div class="aspect-square rounded-xl overflow-hidden bg-surface-container-low mb-4 ambient-shadow"><img alt="${r.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="${r.img}"></div><h3 class="font-bold text-primary">${r.name}</h3><span class="text-primary font-bold">$${r.price.toFixed(2)}</span></a>`).join('');
});
</script></body></html>
