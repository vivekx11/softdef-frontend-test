<!DOCTYPE html><html class="scroll-smooth" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Contact | Verdant Botanical</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#f9f9f9","outline-variant":"#c2c8c3","on-surface":"#1a1c1c","secondary-container":"#dde5db","surface-container-lowest":"#ffffff","surface":"#f9f9f9","on-primary":"#ffffff","surface-container-low":"#f3f3f4","outline":"#727974","surface-container":"#eeeeee","primary-container":"#1a3026","on-surface-variant":"#424844","primary":"#051b12","on-secondary":"#ffffff","on-tertiary":"#ffffff","tertiary":"#00182f","error":"#ba1a1a","on-secondary-fixed-variant":"#414942","on-primary-container":"#80988b","secondary":"#586059"},fontFamily:{"headline-sm":["Noto Serif"],"body-lg":["Inter"],"body-md":["Inter"],"label-md":["Inter"],"headline-md":["Noto Serif"]},fontSize:{"headline-sm":["24px",{lineHeight:"1.4",fontWeight:"600"}],"body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],"body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],"label-md":["14px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],"headline-md":["32px",{lineHeight:"1.3",fontWeight:"600"}]}}}}</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}.ambient-shadow{box-shadow:0 10px 40px -15px rgba(26,48,38,0.08)}.nav-blur{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}</style>
</head><body class="bg-background text-on-surface font-body-md">
<div id="navbar"></div>
<main class="pt-28 pb-24"><div class="max-w-[900px] mx-auto px-6 md:px-12">
<h1 class="font-['Noto_Serif'] text-[36px] md:text-[48px] font-bold text-primary mb-4 text-center">Contact Us</h1>
<p class="text-on-surface-variant font-body-lg text-center mb-12 max-w-xl mx-auto">We'd love to hear from you. Fill out the form below and we'll get back within 24 hours...</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
<div class="bg-surface-container-lowest p-6 rounded-2xl ambient-shadow text-center"><span class="material-symbols-outlined text-3xl text-primary mb-2 block">email</span><h3 class="font-bold text-primary">Email</h3><p class="text-on-surface-variant text-sm">hello@verdant.com</p></div>
<div class="bg-surface-container-lowest p-6 rounded-2xl ambient-shadow text-center"><span class="material-symbols-outlined text-3xl text-primary mb-2 block">call</span><h3 class="font-bold text-primary">Phone</h3><p class="text-on-surface-variant text-sm">+1 (555) 123-4567</p></div>
<div class="bg-surface-container-lowest p-6 rounded-2xl ambient-shadow text-center"><span class="material-symbols-outlined text-3xl text-primary mb-2 block">schedule</span><h3 class="font-bold text-primary">Hours</h3><p class="text-on-surface-variant text-sm">Mon-Fri 9am-6pm EST</p></div>
</div>
<form id="contact-form" class="bg-surface-container-lowest p-10 rounded-2xl ambient-shadow space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div><label class="font-label-md text-label-md text-primary block mb-2">First Name</label><input type="text" required class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/30"></div>
<div><label class="font-label-md text-label-md text-primary block mb-2">Last Name</label><input type="text" required class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/30"></div>
</div>
<div><label class="font-label-md text-label-md text-primary block mb-2">Email</label><input type="email" required class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/30"></div>
<div><label class="font-label-md text-label-md text-primary block mb-2">Subject</label>
<select class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/30"><option>General Inquiry</option><option>Order Support</option><option>Plant Care Question</option><option>Wholesale</option><option>Returns</option></select></div>
<div><label class="font-label-md text-label-md text-primary block mb-2">Message</label><textarea rows="5" required class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary/30 resize-none"></textarea></div>
<button type="submit" class="bg-primary text-on-primary px-10 py-4 rounded-lg font-bold hover:opacity-90 transition-opacity active:scale-95 w-full">Send Message</button>
</form>
</div></main>
<div id="footer"></div>
<script src="/js/app.js"></script><script src="/js/templates.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  initPage('');
  document.getElementById('contact-form').addEventListener('submit',e=>{e.preventDefault();showToast('Message sent! We\'ll reply within 24 hours. 🌿');e.target.reset()});
});
</script></body></html>
